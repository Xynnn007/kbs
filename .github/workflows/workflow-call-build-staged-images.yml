name: Build Staged Images

on:
  workflow_call:
    inputs:
      image_group:
        description: "Which image set to build: kbs | as | kbs-client | rvps | all"
        type: string
        required: false
        default: all
      build_option:
        description: 'Build option for docker buildx (e.g. --push)'
        type: string
        required: false
    secrets:
      GHCR_TOKEN:
        description: 'GitHub token for GHCR'
        required: false

permissions:
  contents: read

jobs:
  kbs:
    if: inputs.image_group == 'kbs' || inputs.image_group == 'all'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: build-in AS
            tag: kbs
            docker_file: kbs/docker/Dockerfile
            arch: x86_64
            platform: linux/amd64
            instance: ubuntu-24.04
            build_args: --build-arg BUILDPLATFORM=linux/amd64 --build-arg ARCH=x86_64
          - name: build-in AS
            tag: kbs
            docker_file: kbs/docker/Dockerfile
            arch: s390x
            platform: linux/s390x
            instance: ubuntu-24.04-s390x
            build_args: --build-arg BUILDPLATFORM=linux/s390x --build-arg ARCH=s390x
          - name: build-in AS
            tag: kbs
            docker_file: kbs/docker/Dockerfile
            arch: aarch64
            platform: linux/arm64
            instance: ubuntu-24.04-arm
            build_args: --build-arg BUILDPLATFORM=linux/arm64 --build-arg ARCH=aarch64

          - name: gRPC AS
            tag: kbs-grpc-as
            docker_file: kbs/docker/coco-as-grpc/Dockerfile
            arch: x86_64
            platform: linux/amd64
            instance: ubuntu-24.04
            build_args: --build-arg BUILDPLATFORM=linux/amd64 --build-arg ARCH=x86_64
          - name: gRPC AS
            tag: kbs-grpc-as
            docker_file: kbs/docker/coco-as-grpc/Dockerfile
            arch: s390x
            platform: linux/s390x
            instance: ubuntu-24.04-s390x
            build_args: --build-arg BUILDPLATFORM=linux/s390x --build-arg ARCH=s390x
          - name: gRPC AS
            tag: kbs-grpc-as
            docker_file: kbs/docker/coco-as-grpc/Dockerfile
            arch: aarch64
            platform: linux/arm64
            instance: ubuntu-24.04-arm
            build_args: --build-arg BUILDPLATFORM=linux/arm64 --build-arg ARCH=aarch64

          - name: Intel Trust Authority AS
            tag: kbs-ita-as
            docker_file: kbs/docker/intel-trust-authority/Dockerfile
            arch: x86_64
            platform: linux/amd64
            instance: ubuntu-24.04
            build_args: --build-arg BUILDPLATFORM=linux/amd64 --build-arg ARCH=x86_64
          - name: Intel Trust Authority AS
            tag: kbs-ita-as
            docker_file: kbs/docker/intel-trust-authority/Dockerfile
            arch: s390x
            platform: linux/s390x
            instance: ubuntu-24.04-s390x
            build_args: --build-arg BUILDPLATFORM=linux/s390x --build-arg ARCH=s390x

          - name: RHEL UBI AS
            tag: rhel-ubi
            docker_file: kbs/docker/rhel-ubi/Dockerfile
            arch: x86_64
            platform: linux/amd64
            instance: ubuntu-24.04
            build_args: --build-arg BUILDPLATFORM=linux/amd64 --build-arg ARCH=x86_64
    runs-on: ${{ matrix.instance }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build ${{ matrix.tag }} (${{ matrix.arch }})
        uses: ./.github/actions/build-single-image
        with:
          ghcr_token: ${{ contains(inputs.build_option, '--push') && secrets.GHCR_TOKEN || '' }}
          docker_file: ${{ matrix.docker_file }}
          tag: ${{ matrix.tag }}
          arch: ${{ matrix.arch }}
          platform: ${{ matrix.platform }}
          build_args: ${{ matrix.build_args }}
          build_option: ${{ inputs.build_option }}

  as:
    if: inputs.image_group == 'as' || inputs.image_group == 'all'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gRPC CoCo-AS
            tag: coco-as-grpc
            docker_file: attestation-service/docker/as-grpc/Dockerfile
            arch: x86_64
            platform: linux/amd64
            instance: ubuntu-24.04
            build_args: --build-arg BUILDPLATFORM=linux/amd64 --build-arg ARCH=x86_64 --build-arg VERIFIER=all-verifier
          - name: gRPC CoCo-AS
            tag: coco-as-grpc
            docker_file: attestation-service/docker/as-grpc/Dockerfile
            arch: s390x
            platform: linux/s390x
            instance: ubuntu-24.04-s390x
            build_args: --build-arg BUILDPLATFORM=linux/s390x --build-arg ARCH=s390x --build-arg VERIFIER=snp-verifier,nvidia-verifier,se-verifier
          - name: gRPC CoCo-AS
            tag: coco-as-grpc
            docker_file: attestation-service/docker/as-grpc/Dockerfile
            arch: aarch64
            platform: linux/arm64
            instance: ubuntu-24.04-arm
            build_args: --build-arg BUILDPLATFORM=linux/arm64 --build-arg ARCH=aarch64 --build-arg VERIFIER=cca-verifier

          - name: RESTful CoCo-AS
            tag: coco-as-restful
            docker_file: attestation-service/docker/as-restful/Dockerfile
            arch: x86_64
            platform: linux/amd64
            instance: ubuntu-24.04
            build_args: --build-arg BUILDPLATFORM=linux/amd64 --build-arg ARCH=x86_64 --build-arg VERIFIER=all-verifier
          - name: RESTful CoCo-AS
            tag: coco-as-restful
            docker_file: attestation-service/docker/as-restful/Dockerfile
            arch: s390x
            platform: linux/s390x
            instance: ubuntu-24.04-s390x
            build_args: --build-arg BUILDPLATFORM=linux/s390x --build-arg ARCH=s390x --build-arg VERIFIER=snp-verifier,nvidia-verifier,se-verifier
          - name: RESTful CoCo-AS
            tag: coco-as-restful
            docker_file: attestation-service/docker/as-restful/Dockerfile
            arch: aarch64
            platform: linux/arm64
            instance: ubuntu-24.04-arm
            build_args: --build-arg BUILDPLATFORM=linux/arm64 --build-arg ARCH=aarch64 --build-arg VERIFIER=cca-verifier
    runs-on: ${{ matrix.instance }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build ${{ matrix.tag }} (${{ matrix.arch }})
        uses: ./.github/actions/build-single-image
        with:
          ghcr_token: ${{ secrets.GHCR_TOKEN }}
          docker_file: ${{ matrix.docker_file }}
          tag: ${{ matrix.tag }}
          arch: ${{ matrix.arch }}
          platform: ${{ matrix.platform }}
          build_args: ${{ matrix.build_args }}
          build_option: ${{ inputs.build_option }}
  
  rvps:
    if: inputs.image_group == 'rvps' || inputs.image_group == 'all'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: RVPS
            tag: rvps
            docker_file: rvps/docker/Dockerfile
            arch: x86_64
            platform: linux/amd64
            instance: ubuntu-24.04
            build_args: --build-arg BUILDPLATFORM=linux/amd64 --build-arg ARCH=x86_64
          - name: RVPS
            tag: rvps
            docker_file: rvps/docker/Dockerfile
            arch: s390x
            platform: linux/s390x
            instance: ubuntu-24.04-s390x
            build_args: --build-arg BUILDPLATFORM=linux/s390x --build-arg ARCH=s390x
          - name: RVPS
            tag: rvps
            docker_file: rvps/docker/Dockerfile
            arch: aarch64
            platform: linux/arm64
            instance: ubuntu-24.04-arm
            build_args: --build-arg BUILDPLATFORM=linux/arm64 --build-arg ARCH=aarch64
    runs-on: ${{ matrix.instance }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build ${{ matrix.tag }} (${{ matrix.arch }})
        uses: ./.github/actions/build-single-image
        with:
          ghcr_token: ${{ secrets.GHCR_TOKEN }}
          docker_file: ${{ matrix.docker_file }}
          tag: ${{ matrix.tag }}
          arch: ${{ matrix.arch }}
          platform: ${{ matrix.platform }}
          build_args: ${{ matrix.build_args }}
          build_option: ${{ inputs.build_option }}

  kbs-client:
    if: inputs.image_group == 'kbs-client' || inputs.image_group == 'all'
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: kbs-client-image
            docker_file: kbs/docker/kbs-client-image/Dockerfile
            arch: x86_64
            instance: ubuntu-24.04
          - tag: kbs-client-image
            docker_file: kbs/docker/kbs-client-image/Dockerfile
            arch: s390x
            instance: ubuntu-24.04-s390x
          - tag: kbs-client-image
            docker_file: kbs/docker/kbs-client-image/Dockerfile
            arch: aarch64
            instance: ubuntu-24.04-arm
    runs-on: ${{ matrix.instance }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build ${{ matrix.tag }} (${{ matrix.arch }})
        uses: ./.github/actions/build-single-image
        with:
          ghcr_token: ${{ secrets.GHCR_TOKEN }}
          docker_file: ${{ matrix.docker_file }}
          tag: ${{ matrix.tag }}
          arch: ${{ matrix.arch }}
          build_option: ${{ inputs.build_option }}
